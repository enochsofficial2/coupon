<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모담헤어 관리자 대시보드</title>
    <style>
        :root { --primary:#111; --bg:#F6F6F6; --card:#fff; --muted:#888; --danger:#E06666; --naver:#03C75A; }
        * { box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:var(--bg); color:var(--primary); margin:0; padding:0; }
        .header { background:#111; color:#fff; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { margin:0; font-size:1.1rem; }
        .content { padding:24px; max-width:1400px; margin:0 auto; }
        .btn { padding:9px 16px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:0.85rem; font-weight:bold; cursor:pointer; font-family:inherit; transition:background 0.2s; }
        .btn:hover { background:#333; }
        .btn-outline { background:transparent; border:1px solid var(--primary); color:var(--primary); }
        .btn-green { background:var(--naver); color:#fff; border:none; }
        .btn-red { background:var(--danger); color:#fff; border:none; }
        .btn-gray { background:#555; color:#fff; border:none; }
        .search-bar { background:#EAEAEA; padding:14px; border-radius:10px; display:flex; gap:10px; align-items:center; margin-bottom:24px; }
        .search-bar input { flex:1; padding:10px; border:1px solid #CCC; border-radius:6px; font-size:0.9rem; font-weight:bold; text-transform:uppercase; font-family:inherit; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:24px; }
        .stat { background:var(--card); border:1px solid #EEE; border-radius:12px; padding:18px; text-align:center; }
        .stat .label { font-size:0.8rem; color:var(--muted); }
        .stat .num { font-size:1.5rem; font-weight:800; margin-top:5px; }
        .card { background:var(--card); border:1px solid #EEE; border-radius:12px; padding:20px; margin-bottom:20px; }
        .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .card-head h3 { margin:0; font-size:1rem; }
        table { width:100%; border-collapse:collapse; font-size:0.83rem; }
        th { background:#FAFAFA; padding:10px; text-align:left; font-weight:700; border-bottom:1px solid #EEE; white-space:nowrap; }
        td { padding:10px; border-bottom:1px solid #EEE; vertical-align:middle; }
        tr:hover td { background:#FAFAFA; }
        .badge { padding:3px 8px; border-radius:4px; font-size:0.75rem; font-weight:bold; white-space:nowrap; }
        .b-used { background:#111; color:#fff; }
        .b-new { background:#EEE; color:#666; }
        .pt-input { width:72px; padding:5px; border:1px solid #CCC; border-radius:4px; font-size:0.8rem; text-align:right; margin-right:3px; }
        .loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
        .loading.on { display:flex; }
        .spin { width:34px; height:34px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:sp 0.7s linear infinite; }
        @keyframes sp { to { transform:rotate(360deg); } }
        /* 로그인 */
        #login-wrap { position:fixed; inset:0; background:#F6F6F6; display:flex; align-items:center; justify-content:center; z-index:500; }
        .login-box { background:#fff; border:1px solid #EEE; border-radius:12px; padding:36px 32px; width:320px; text-align:center; }
        .login-box h2 { margin:0 0 20px; font-size:1.1rem; }
        .login-box input { width:100%; padding:12px; border:1px solid #DDD; border-radius:6px; font-size:0.95rem; font-family:inherit; margin-bottom:10px; }
        .pw-err { color:var(--danger); font-size:0.8rem; margin-top:6px; display:none; }
        @media(max-width:768px) { .content { padding:14px; } .header h1 { font-size:0.95rem; } }
    </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-wrap">
    <div class="login-box">
        <h2>🖤 모담헤어 관리자</h2>
        <input type="password" id="pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
        <button class="btn" style="width:100%;" onclick="login()">로그인</button>
        <div class="pw-err" id="pw-err">비밀번호가 틀렸습니다.</div>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <h1>🖤 모담헤어 [분당본점] 리퍼럴 시스템 관리 대시보드</h1>
        <div style="display:flex;gap:8px;">
            <button class="btn" onclick="loadAll()">🔄 새로고침</button>
            <button class="btn btn-gray" onclick="downloadCSV()">📥 엑셀 다운로드</button>
            <button class="btn btn-red" onclick="clearAll()">전체 초기화</button>
        </div>
    </div>

    <div class="content">
        <!-- 쿠폰 조회 -->
        <div class="search-bar">
            <span style="font-weight:bold;font-size:0.9rem;white-space:nowrap;">🔍 쿠폰 현장 검증:</span>
            <input type="text" id="search-code" placeholder="고객이 보여준 쿠폰번호 입력 (CP-XXXXXX)">
            <button class="btn" onclick="searchCoupon()">조회 및 확정</button>
        </div>

        <!-- 통계 -->
        <div class="stats">
            <div class="stat"><div class="label">총 쿠폰 발급</div><div class="num" id="s-total">0</div></div>
            <div class="stat"><div class="label">시술 완료</div><div class="num" id="s-used">0</div></div>
            <div class="stat"><div class="label">추천 유입</div><div class="num" id="s-ref">0</div></div>
            <div class="stat"><div class="label">누적 포인트</div><div class="num" id="s-pts">0P</div></div>
            <div class="stat"><div class="label">마케팅 동의</div><div class="num" id="s-mkt">0</div></div>
            <div class="stat"><div class="label">전환율</div><div class="num" id="s-rate">0%</div></div>
        </div>

        <!-- 고객 목록 -->
        <div class="card">
            <div class="card-head">
                <h3>📱 1. 실시간 살롱 예약 및 마케팅 알림 제어</h3>
                <input type="text" id="c-search" placeholder="이름/전화번호 검색" style="padding:7px 10px;border:1px solid #DDD;border-radius:6px;font-size:0.85rem;font-family:inherit;" oninput="filterTable()">
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>고객명</th><th>전화번호</th><th>쿠폰코드</th><th>내추천코드</th>
                            <th>유입추천인</th><th>포인트</th><th>시술상태</th><th>현장인증</th><th>문자발송</th>
                        </tr>
                    </thead>
                    <tbody id="t-cust"><tr><td colspan="9" style="text-align:center;color:#888;padding:30px;">로딩 중...</td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- 추천인 관리 -->
        <div class="card">
            <div class="card-head"><h3>🏆 2. 추천인 실적 및 포인트 지급/차감 관리</h3></div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>고객명</th><th>추천코드</th><th>가입수</th><th>시술완료수</th>
                            <th>보유포인트</th><th>💰 포인트 조절</th><th>미션상태</th>
                        </tr>
                    </thead>
                    <tbody id="t-ref"><tr><td colspan="7" style="text-align:center;color:#888;padding:30px;">로딩 중...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="loading" id="loading"><div class="spin"></div><div style="color:#fff;font-size:0.9rem;">처리 중...</div></div>

<script>
// ★ 여기에 구글 Apps Script URL 붙여넣기 ★
const API = 'https://script.google.com/macros/s/AKfycbwqvmrVLQwIfqxm4vxXs1zl_os2slEkiptiGZREQ0T5ZcYhgEsz4t0pu_8KxUJL9vb3YA/exec';
const ADMIN_PW = 'modamhair2024'; // ← 비밀번호 변경 가능

let customers = [];

function login() {
    if (document.getElementById('pw').value === ADMIN_PW) {
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
    } else {
        document.getElementById('pw-err').style.display = 'block';
    }
}

function load(v) { document.getElementById('loading').classList.toggle('on', v); }

async function post(body) {
    const r = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    return r.json();
}
async function get(p) {
    const r = await fetch(API + '?' + new URLSearchParams(p));
    return r.json();
}

async function loadAll() {
    load(true);
    try {
        const d = await get({ action: 'customers' });
        if (d.success) { customers = d.customers; renderAll(); }
    } catch(e) { alert('데이터 로드 실패. API URL을 확인해주세요.'); }
    load(false);
}

function renderAll() {
    const used = customers.filter(c => c.coupon_status === '사용완료').length;
    const refCount = customers.filter(c => c.referred_by_code && c.referred_by_code !== '-').length;
    const totalPts = customers.reduce((s,c) => s + (Number(c.total_points)||0), 0);
    const mkt = customers.filter(c => c.marketing_consent === 'Y').length;

    document.getElementById('s-total').innerText = customers.length;
    document.getElementById('s-used').innerText = used;
    document.getElementById('s-ref').innerText = refCount;
    document.getElementById('s-pts').innerText = totalPts.toLocaleString() + 'P';
    document.getElementById('s-mkt').innerText = mkt;
    document.getElementById('s-rate').innerText = customers.length ? Math.round(used/customers.length*100) + '%' : '0%';

    renderCustomers(customers);
    renderReferrers(customers);
}

function renderCustomers(list) {
    const tbody = document.getElementById('t-cust');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#888;padding:30px;">데이터 없음</td></tr>'; return; }
    tbody.innerHTML = list.map(c => `
        <tr>
            <td><strong>${c.name}</strong></td>
            <td>${fmtPhone(c.phone)}</td>
            <td><code style="font-size:0.78rem;">${c.coupon_code||'—'}</code></td>
            <td><small>${c.my_referral_code||'—'}</small></td>
            <td>${c.referred_by_code||'—'}</td>
            <td style="font-weight:bold;">${(Number(c.total_points)||0).toLocaleString()}P</td>
            <td>${c.coupon_status==='사용완료' ? '<span class="badge b-used">시술완료</span>' : '<span class="badge b-new">미방문</span>'}</td>
            <td>${c.coupon_status!=='사용완료' ? `<button class="btn btn-outline" style="padding:5px 10px;font-size:0.78rem;" onclick="useCoupon('${c.coupon_code}')">시술확정</button>` : '—'}</td>
            <td><button class="btn btn-gray" style="padding:5px 10px;font-size:0.78rem;" onclick="sendSMS('${c.phone}','${c.name}')">🎟️ 문자발송</button></td>
        </tr>
    `).join('');
}

function renderReferrers(list) {
    const tbody = document.getElementById('t-ref');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;padding:30px;">데이터 없음</td></tr>'; return; }
    tbody.innerHTML = list.map(r => {
        const inv = list.filter(s => (s.referred_by_code||'').toUpperCase() === (r.my_referral_code||'').toUpperCase()).length;
        const vis = list.filter(s => (s.referred_by_code||'').toUpperCase() === (r.my_referral_code||'').toUpperCase() && s.coupon_status === '사용완료').length;
        const pts = Number(r.total_points)||0;
        let badge = '<span class="badge b-new">🌱 일반</span>';
        if (vis >= 5) badge = '<span class="badge" style="background:#E06666;color:#fff;">👑 VIP추천왕</span>';
        else if (vis >= 3) badge = '<span class="badge" style="background:#03C75A;color:#fff;">⭐ 우수</span>';
        return `
            <tr>
                <td><strong>${r.name}</strong></td>
                <td><code>${r.my_referral_code}</code></td>
                <td>${inv}명</td>
                <td><strong>${vis}명</strong></td>
                <td style="font-weight:bold;">${pts.toLocaleString()}P</td>
                <td>
                    <input type="number" class="pt-input" id="pt_${r.phone}" placeholder="포인트">
                    <button class="btn btn-green" style="padding:5px 9px;font-size:0.78rem;" onclick="adjustPt('${r.phone}','${r.name}',true)">지급</button>
                    <button class="btn btn-outline" style="padding:5px 9px;font-size:0.78rem;" onclick="adjustPt('${r.phone}','${r.name}',false)">차감</button>
                </td>
                <td>${badge}</td>
            </tr>
        `;
    }).join('');
}

function filterTable() {
    const q = document.getElementById('c-search').value.toLowerCase();
    const filtered = q ? customers.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q)) : customers;
    renderCustomers(filtered);
}

async function searchCoupon() {
    let code = document.getElementById('search-code').value.trim().toUpperCase();
    if (!code) { alert('쿠폰 번호를 입력해주세요.'); return; }
    if (!code.startsWith('CP-') && code.length === 6) code = 'CP-' + code;

    const c = customers.find(x => (x.coupon_code||'').toUpperCase() === code);
    if (!c) { alert('❌ 존재하지 않는 쿠폰입니다.'); return; }
    if (c.coupon_status === '사용완료') { alert(`⚠️ 이미 시술 완료된 쿠폰입니다.\n고객명: ${c.name}`); return; }

    if (confirm(`✅ 유효한 쿠폰입니다!\n\n고객명: ${c.name}\n혜택: 20,000원 할인\n\n시술 완료 처리하시겠습니까?`)) {
        await useCoupon(code);
        document.getElementById('search-code').value = '';
    }
}

async function useCoupon(couponCode) {
    load(true);
    try {
        const d = await post({ action:'useCoupon', couponCode });
        alert(d.message);
        if (d.success) await loadAll();
    } catch(e) { alert('오류가 발생했습니다.'); }
    load(false);
}

async function adjustPt(phone, name, isAdd) {
    const input = document.getElementById('pt_' + phone);
    const amount = parseInt(input.value);
    if (isNaN(amount) || amount <= 0) { alert('포인트 금액을 입력해주세요.'); return; }
    if (!confirm(`${name} 고객님께 ${amount.toLocaleString()}P를 ${isAdd?'지급':'차감'}하시겠습니까?`)) return;
    load(true);
    try {
        const d = await post({ action:'addPoint', phone, type:isAdd?'earn':'use', amount, reason: isAdd?'관리자 지급':'관리자 차감' });
        alert(d.message);
        if (d.success) { input.value=''; await loadAll(); }
    } catch(e) { alert('오류가 발생했습니다.'); }
    load(false);
}

async function sendSMS(phone, name) {
    load(true);
    try {
        await post({ action:'sendSMS', phone: phone.replace(/[^0-9]/g,''), name });
        alert(`🚀 ${name} 고객님께 문자 발송 요청이 전송되었습니다.`);
    } catch(e) { alert('발송 오류가 발생했습니다.'); }
    load(false);
}

async function clearAll() {
    if (!confirm('⚠️ 전체 데이터를 삭제할까요? 되돌릴 수 없습니다.')) return;
    if (!confirm('정말 삭제하시겠습니까?')) return;
    load(true);
    try {
        const d = await post({ action:'resetAll' });
        alert(d.message);
        customers = [];
        renderAll();
    } catch(e) { alert('오류가 발생했습니다.'); }
    load(false);
}

function downloadCSV() {
    if (!customers.length) { alert('데이터가 없습니다.'); return; }
    const headers = ['고객명','전화번호','쿠폰코드','내추천코드','입력추천코드','포인트','상태','발급일','사용일','마케팅동의'];
    const rows = customers.map(c => [c.name, c.phone, c.coupon_code, c.my_referral_code, c.referred_by_code||'', c.total_points||0, c.coupon_status||'', c.issued_at||'', c.used_at||'', c.marketing_consent]);
    const csv = '\uFEFF' + [headers,...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
    a.download = `모담헤어_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}

function fmtPhone(p) {
    const v = String(p||'').replace(/[^0-9]/g,'');
    return v.length===11 ? v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7) : p||'—';
}
</script>
</body>
</html>
