<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모담헤어 CRM & 쿠폰 발급 시스템</title>
    <!-- 구글 폰트 적용 (깔끔한 고딕체) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-color: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background-color: #e2e8f0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* 페이지 전환용 세션 */
        .page-section {
            display: none;
            background: var(--card-color);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .page-section.active {
            display: block;
        }

        /* 폼 스타일 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2);
        }

        /* 완료 페이지 대형 카드 */
        .complete-card {
            text-align: center;
            padding: 30px 10px;
        }

        .complete-card .icon {
            font-size: 50px;
            color: #2ecc71;
            margin-bottom: 15px;
        }

        .code-box {
            background-color: #f1f2f6;
            padding: 15px;
            border-radius: 6px;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 1px;
            margin: 15px 0;
            border: 1px dashed #ced4da;
        }

        /* 대시보드 테이블 스타일 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f1f2f6;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid var(--primary-color);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #747d8c;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px 10px;
            text-align: center;
        }

        th {
            background-color: #f1f2f6;
            font-weight: 500;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input {
            margin-top: 5px;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #57606f;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>모담헤어 멤버십 시스템</h1>
    </header>

    <!-- 상단 내비게이션 탭 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="routeTo('mPageRegister')">🎟️ 쿠폰 신청</button>
        <button class="tab-btn" onclick="routeTo('mPageAdmin')">📊 관리자 대시보드</button>
    </div>

    <!-- 1. 고객 쿠폰 등록 페이지 -->
    <section id="mPageRegister" class="page-section active">
        <div class="form-group">
            <label for="custName">고객 성함</label>
            <input type="text" id="custName" class="form-control" placeholder="홍길동">
        </div>
        <div class="form-group">
            <label for="custPhone">휴대폰 번호</label>
            <input type="tel" id="custPhone" class="form-control" placeholder="01012345678 (숫자만 입력)">
        </div>
        <div class="form-group">
            <label for="custRefCode">추천인 코드 (선택)</label>
            <input type="text" id="custRefCode" class="form-control" placeholder="지인에게 받은 코드가 있다면 입력">
        </div>
        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" id="agreeRequired">
                <label for="agreeRequired">[필수] 우대 쿠폰 발급 및 서비스 안내를 위한 개인정보 수집 및 문자/카카오톡 발송에 동의합니다.</label>
            </div>
        </div>
        <button class="btn-submit" onclick="submitCouponRegistration()">우대 쿠폰 무료 발급받기</button>
    </section>

    <!-- 2. 발급 완료 페이지 -->
    <section id="mPageComplete" class="page-section">
        <div class="complete-card">
            <div class="icon">✓</div>
            <h2>쿠폰 발급이 완료되었습니다!</h2>
            <p style="margin-top: 8px; color: #57606f;">고객님의 휴대폰으로 쿠폰 번호가 자동 전송되었습니다.</p>
            
            <div style="margin-top: 25px;">
                <p style="font-size: 14px; font-weight: 500;">내 쿠폰 번호</p>
                <div id="lblCouponCode" class="code-box">-</div>
            </div>

            <div style="margin-top: 15px;">
                <p style="font-size: 14px; font-weight: 500;">나의 고유 추천인 코드</p>
                <p style="font-size: 12px; color: #747d8c; margin-bottom: 5px;">지인이 이 코드를 쓰고 등록하면 두 분 모두에게 혜택이 주어집니다.</p>
                <div id="lblMyRefCode" class="code-box">-</div>
            </div>

            <button class="btn-submit" style="background-color: var(--primary-color); margin-top: 20px;" onclick="resetForm()">처음으로 돌아가기</button>
        </div>
    </section>

    <!-- 3. 관리자 대시보드 페이지 -->
    <section id="mPageAdmin" class="page-section">
        <h2 style="margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid var(--primary-color); padding-bottom: 8px;">📊 실시간 등록 현황</h2>
        
        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>총 등록 고객</h3>
                <p id="statTotal">0명</p>
            </div>
            <div class="stat-card" style="border-left-color: #2ecc71;">
                <h3>쿠폰 사용 완료</h3>
                <p id="statUsed">0명</p>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>등록일시</th>
                        <th>이름</th>
                        <th>연락처</th>
                        <th>쿠폰코드</th>
                        <th>내 추천코드</th>
                        <th>추천한 사람</th>
                        <th>상태 변경</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <!-- JavaScript로 동적 삽입됨 -->
                </tbody>
            </table>
        </div>
    </section>
</div>

<script>
    // 로컬 데이터베이스 초기화
    let customers = JSON.parse(localStorage.getItem('crm_customers_modam_v3')) || [];

    // 화면 탭 전환 기능
    function routeTo(sectionId) {
        document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(sectionId).classList.add('active');
        
        if (sectionId === 'mPageRegister') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else if (sectionId === 'mPageAdmin') {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            updateAdminDashboard();
        }
    }

    // 쿠폰 발급 및 솔라피 직통 전송 함수
    function submitCouponRegistration() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        let refCode = document.getElementById('custRefCode').value.trim().toUpperCase();
        
        if (!name || !phone) { alert('이름과 휴대폰 번호를 정확히 입력해주세요.'); return; }
        if (!document.getElementById('agreeRequired').checked) { alert('필수 이용동의가 필요합니다.'); return; }
        if (customers.some(c => c.phone === phone)) { alert('이미 등록 완료된 고객 번호입니다.'); return; }

        // 고유 랜덤 코드 생성
        const couponCode = 'CP-' + Math.floor(100000 + Math.random() * 900000);
        const myRefCode = 'REF-' + phone.slice(-4).toUpperCase();

        const newCustomer = {
            id: 'CUST_' + Date.now(),
            date: new Date().toLocaleString('ko-KR'),
            name: name,
            phone: phone,
            couponCode: couponCode,
            myRefCode: myRefCode,
            referredBy: refCode || '-',
            status: 'issued'
        };

        // ==========================================
        // 🚀 솔라피 자동 문자 발송 설정 파트
        // ==========================================
        const apiKey = 'NCSDO3UTATTYM0XD';
        const apiSecret = 'QLLXM7XQ8CFFZZDGPITUOAA6VVLNUY3X';
        
        // ⚠️ [필수 수정] 솔라피에 등록 완료하신 매장 발신번호를 아래에 하이픈(-) 없이 넣어주세요!
        // 예시: '01012345678' 또는 '021234567'
        const storePhoneNumber = '여기에_등록한_매장_번호_입력'; 

        const messagePayload = {
            message: {
                to: phone, // 고객 연락처로 발송
                from: storePhoneNumber,
                text: `[모담헤어] ${name}님, 우대 쿠폰이 발급되었습니다.\n\n▶ 쿠폰번호: ${couponCode}\n▶ 나의 추천코드: ${myRefCode}\n\n매장 방문 시 직원에게 쿠폰번호를 제시해 주세요.`
            }
        };

        // 솔라피 규격 인증 방식 (Base64 인코딩 표준 통신)
        const credential = btoa(`${apiKey}:${apiSecret}`);
        
        if (storePhoneNumber !== '여기에_등록한_매장_번호_입력') {
            fetch('https://api.solapi.com/messages/v4/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Basic ${credential}`
                },
                body: JSON.stringify(messagePayload)
            })
            .then(res => res.json())
            .then(data => console.log('솔라피 발송 시스템 신호:', data))
            .catch(err => console.error('솔라피 통신 에러:', err));
        } else {
            console.log('발신 번호가 입력되지 않아 시뮬레이션 모드로 처리되었습니다.');
        }
        // ==========================================

        // 로컬 DB 저장
        customers.push(newCustomer);
        localStorage.setItem('crm_customers_modam_v3', JSON.stringify(customers));

        // 완료 화면 데이터 바인딩
        document.getElementById('lblCouponCode').innerText = couponCode;
        document.getElementById('lblMyRefCode').innerText = myRefCode;
        
        routeTo('mPageComplete');
    }

    // 대시보드 데이터 갱신 및 렌더링
    function updateAdminDashboard() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';

        let totalCount = customers.length;
        let usedCount = customers.filter(c => c.status === 'used').length;

        document.getElementById('statTotal').innerText = totalCount + '명';
        document.getElementById('statUsed').innerText = usedCount + '명';

        // 최신순 정렬 후 테이블 출력
        [...customers].reverse().forEach(cust => {
            const tr = document.createElement('tr');
            
            const isUsed = cust.status === 'used';
            const btnText = isUsed ? '사용완료' : '사용처리';
            const btnDisabled = isUsed ? 'disabled style="background-color:#cbd5e1; color:#94a3b8; border:none; padding:4px 8px; border-radius:4px;"' : 'style="background-color:#2ecc71; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;"';

            tr.innerHTML = `
                <td>${cust.date || '-'}</td>
                <td><strong>${cust.name}</strong></td>
                <td>${cust.phone}</td>
                <td><code style="background:#f1f2f6; padding:2px 4px; border-radius:4px;">${cust.couponCode}</code></td>
                <td><mark style="background:#fff3cd; padding:2px 4px;">${cust.myRefCode}</mark></td>
                <td>${cust.referredBy}</td>
                <td>
                    <button ${btnDisabled} onclick="changeStatus('${cust.id}')">${btnText}</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 쿠폰 사용 완료 처리 기능
    function changeStatus(customerId) {
        if (!confirm('해당 고객의 쿠폰을 사용 완료 처리하시겠습니까?')) return;
        
        customers = customers.map(c => {
            if (c.id === customerId) {
                return { ...c, status: 'used' };
            }
            return c;
        });

        localStorage.setItem('crm_customers_modam_v3', JSON.stringify(customers));
        updateAdminDashboard();
    }

    // 입력 폼 초기화
    function resetForm() {
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';
        document.getElementById('custRefCode').value = '';
        document.getElementById('agreeRequired').checked = false;
        routeTo('mPageRegister');
    }
</script>

</body>
</html>
