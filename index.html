<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enochs Coupon Event</title>
    <style>
        /* 깔끔하고 직관적인 모바일 우선 쿠폰 페이지 디자인 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .coupon-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 13px;
            color: #333333;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        input[type="text"]:focus {
            border-color: #4a90e2;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="coupon-container">
    <h1>이녹스 쿠폰 이벤트</h1>
    <p>휴대폰 번호를 입력하시면 쿠폰을 문자로 자동 발송해 드립니다.</p>
    
    <div class="input-group">
        <label for="phone-input">휴대폰 번호</label>
        <input type="text" id="phone-input" placeholder="예: 01012345678 (- 제외)">
    </div>
    
    <button onclick="submitCoupon()">쿠폰 번호 무료 받기</button>
</div>

<script>
async function submitCoupon() {
  const phoneInput = document.getElementById('phone-input');
  let phoneInputValue = phoneInput ? phoneInput.value.trim() : "";
  
  if(!phoneInputValue) {
    alert('휴대폰 번호를 입력해주세요.');
    return;
  }
  
  // 하이픈(-) 기호가 들어왔을 경우 자동으로 제거해주는 안전 장치
  phoneInputValue = phoneInputValue.replace(/-/g, "");
  
  // 아까 발급받으신 구글 웹 앱 URL 주소 연동 완료
  const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbzdolow5_TRW_llcA5kbbBGemhEMrBK20UhrXUePPl8ojzdsIVBAlFpgPAC3wNLrZWDeA/exec"; 
  
  try {
    // 버튼을 누르면 구글 웹 앱 주소로 신호를 쏩니다.
    await fetch(googleWebAppUrl, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain" 
      },
      body: JSON.stringify({ phone: phoneInputValue })
    });
    
    alert('쿠폰이 정상 발급되어 문자로 발송되었습니다!\n구글 스프레드시트를 확인해보세요.');
    if(phoneInput) phoneInput.value = ""; // 발송 성공 후 입력창 초기화
    
  } catch (error) {
    console.error('발송 에러:', error);
    alert('시스템 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
  }
}
</script>

</body>
</html>
