<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모담헤어 분당본점 - 멤버십 이벤트</title>
    <style>
        :root {
            --primary-color: #111111;    
            --secondary-color: #777777;  
            --bg-color: #F6F6F6;         
            --card-bg: #FFFFFF;
            --text-main: #111111;
            --text-muted: #888888;
            --naver-color: #03C75A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: var(--card-bg);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (min-width: 450px) {
            .mobile-container {
                border-radius: 30px;
                height: 800px;
            }
        }

        .mobile-page { display: none; padding: 35px 28px; flex-direction: column; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .mobile-page.active { display: flex; }

        .brand-logo-container { text-align: center; margin-bottom: 25px; padding: 10px 0; }
        .brand-logo-text {
            font-size: 2.2rem; font-weight: 900; letter-spacing: 6px; color: var(--primary-color);
            font-family: "Impact", "Arial Black", sans-serif; margin: 0; text-transform: uppercase;
        }
        .brand-subtitle { font-size: 0.75rem; color: var(--secondary-color); letter-spacing: 4px; margin-top: 6px; font-weight: bold; }

        .hero-box {
            text-align: center; background: #F9F9F9; padding: 25px 15px; border-radius: 16px; margin-bottom: 24px; border: 1px solid #EEEEEE;
        }
        .hero-box h2 { font-size: 1.35rem; color: var(--primary-color); margin: 10px 0; font-weight: 800; letter-spacing: -0.5px; }
        .coupon-value { font-size: 2.3rem; font-weight: 900; color: var(--primary-color); margin: 12px 0; letter-spacing: -1px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--primary-color); }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #E0E0E0; border-radius: 8px; box-sizing: border-box; background-color: #FAFAFA; font-size: 0.95rem; }
        
        .checkbox-group { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 20px; font-size: 0.85rem; color: #444444; line-height: 1.4; }
        
        .btn {
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; text-align: center;
            letter-spacing: 0.5px; text-decoration: none; display: block; box-sizing: border-box;
        }
        .btn-outline { background-color: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); }
        .btn-kakao { background-color: #FEE500; color: #191919; }
        .btn-naver { background-color: var(--naver-color); color: white; }

        .digital-coupon {
            background: linear-gradient(135deg, #111111 0%, #333333 100%); color: #FFFFFF; padding: 30px 20px; border-radius: 14px; text-align: center; margin: 20px 0; position: relative;
        }
        .digital-coupon::before, .digital-coupon::after {
            content: ''; position: absolute; top: 50%; width: 12px; height: 12px; background: var(--card-bg); border-radius: 50%; margin-top: -6px;
        }
        .digital-coupon::before { left: -6px; }
        .digital-coupon::after { right: -6px; }

        .ref-display-box { background: #F9F9F9; padding: 16px; border-radius: 8px; text-align: center; margin: 10px 0; font-weight: bold; border: 1px dashed var(--secondary-color); }
        .point-card { background: #111111; color: white; padding: 25px; border-radius: 16px; margin-bottom: 20px; text-align: center; }
        .point-value { font-size: 2.4rem; font-weight: 900; color: #FFFFFF; margin: 8px 0; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <!-- 1. 랜딩 페이지 -->
    <div id="mPageLanding" class="mobile-page active">
        <div class="brand-logo-container">
            <h1 class="brand-logo-text">MODAM</h1>
            <div class="brand-subtitle">모두를 담다 · 분당본점</div>
        </div>
        <div class="hero-box">
            <p style="margin:0; font-size:0.85rem; color:var(--secondary-color); letter-spacing: 0.5px;">지인 추천 리퍼럴 이벤트</p>
            <h2>첫 방문 감사 우대 쿠폰</h2>
            <div class="coupon-value">20,000원 할인</div>
        </div>
        <div style="font-size: 0.85rem; color:#888888; margin-bottom: 30px; text-align: center; line-height: 1.4;">
            ✨ 초대 링크 공유 시 친구도 나도 포인트 적립!
        </div>
        <button class="btn" onclick="routeTo('mPageInput')" style="margin-bottom: 12px;">추천인 등록하고 쿠폰 발급</button>
        <button class="btn btn-outline" onclick="routeTo('mPageQuery')" style="margin-bottom: 12px;">🔍 내 포인트 및 추천현황 조회</button>
        <a href="https://map.naver.com/p/search/%EB%AA%A8%EB%8B%B4%ED%97%A4%EC%96%B4/place/2026013877" target="_blank" class="btn btn-naver">🗓️ 모담헤어 네이버 실시간 예약하기</a>
    </div>

    <!-- 2. 입력 폼 -->
    <div id="mPageInput" class="mobile-page">
        <div class="brand-logo-container">
            <h1 class="brand-logo-text">MODAM</h1>
            <div class="brand-subtitle">멤버십 신규 등록</div>
        </div>
        <div class="form-group"><label>고객명</label><input type="text" id="custName" placeholder="성함을 입력해주세요"></div>
        <div class="form-group"><label>휴대폰 번호</label><input type="tel" id="custPhone" placeholder="01012345678"></div>
        <div class="form-group"><label>지인 추천인 코드 (선택)</label><input type="text" id="custRefCode" placeholder="예: REF-1234"></div>

        <div class="checkbox-group">
            <input type="checkbox" id="agreeRequired">
            <label for="agreeRequired"><strong>[필수]</strong> 개인정보 수집 및 이용 동의</label>
        </div>
        <button class="btn" onclick="submitCouponRegistration()">헤어 시술 쿠폰 발급</button>
    </div>

    <!-- 3. 발급 완료 -->
    <div id="mPageComplete" class="mobile-page">
        <div class="brand-logo-container">
            <h1 class="brand-logo-text">MODAM</h1>
            <div class="brand-subtitle">발급 완료 🎉</div>
        </div>
        <div class="digital-coupon">
            <span style="font-size:0.75rem; opacity: 0.7;">모담 우대 웰컴 티켓</span>
            <h3 style="margin: 5px 0 15px 0; font-size: 1.6rem;">20,000원 시술 할인</h3>
            <div style="background: #FFFFFF; color: #111111; padding: 8px; font-weight: bold; font-family: monospace; letter-spacing: 1px;" id="lblCouponCode">CP-XXXXXX</div>
        </div>
        <div class="ref-display-box">
            <span style="font-size: 0.8rem; color: var(--text-muted);">내 고유 추천코드</span><br>
            <span id="lblMyRefCode" style="color: var(--primary-color); font-size: 1.2rem;">REF-XXXX</span>
        </div>
        <button class="btn btn-kakao" onclick="simulateKakaoShare()">💬 카카오톡 초대 링크 복사</button>
        <button class="btn" style="margin-top:12px; background:#666666;" onclick="resetFormToStart()">처음으로</button>
    </div>

    <!-- 4. 조회 페이지 -->
    <div id="mPageQuery" class="mobile-page">
        <div class="brand-logo-container">
            <h1 class="brand-logo-text">MODAM</h1>
            <div class="brand-subtitle">포인트 조회</div>
        </div>
        <div class="form-group">
            <label>휴대폰 번호 입력</label>
            <input type="tel" id="queryPhone" placeholder="01012345678">
        </div>
        <button class="btn" onclick="lookupCustomerPoint()" style="margin-bottom: 12px;">조회하기</button>
        <button class="btn btn-outline" onclick="routeTo('mPageLanding')">이전으로</button>
    </div>

    <!-- 5. 조회 결과 -->
    <div id="mPageQueryResult" class="mobile-page">
        <div class="brand-logo-container">
            <h1 class="brand-logo-text">MODAM</h1>
            <div class="brand-subtitle" id="queryResultTitle">고객님 멤버십 현황</div>
        </div>
        <div class="point-card">
            <div style="font-size:0.8rem; opacity:0.7;">총 보유 포인트</div>
            <div class="point-value" id="queryPointDisplay">0 P</div>
        </div>
        <div class="ref-display-box">
            <span style="font-size: 0.8rem; color: var(--text-muted);">내 추천 코드</span><br>
            <span id="queryMyRefCode" style="font-size: 1.2rem;">REF-XXXX</span>
        </div>
        <button class="btn btn-outline" onclick="routeTo('mPageLanding')">처음으로</button>
    </div>

</div>

<script>
    const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzdolow5_TRW_llcA5kbbBGemhEMrBK20UhrXUePPl8ojzdsIVBAlFpgPAC3wNLrZWDeA/exec";

    // 데이터 싱크를 위해 localStorage 키는 동일하게 유지합니다.
    let customers = JSON.parse(localStorage.getItem('crm_customers_modam_v3')) || [];

    function routeTo(pageId) {
        document.querySelectorAll('.mobile-page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('ref')) {
            document.getElementById('custRefCode').value = urlParams.get('ref').toUpperCase();
            routeTo('mPageInput');
        }
    };

    async function submitCouponRegistration() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim().replace(/[^0-9]/g, '');
        let refCode = document.getElementById('custRefCode').value.trim().toUpperCase();
        
        if (!name || !phone) { alert('이름과 휴대폰 번호를 입력해주세요.'); return; }
        if (!document.getElementById('agreeRequired').checked) { alert('필수 동의가 필요합니다.'); return; }
        
        // 실시간 동기화를 위해 매번 localStorage 다시 읽기
        customers = JSON.parse(localStorage.getItem('crm_customers_modam_v3')) || [];
        if (customers.some(c => c.phone === phone)) { alert('이미 등록된 번호입니다.'); return; }

        const couponCode = 'CP-' + Math.floor(100000 + Math.random() * 900000);
        const myRefCode = 'REF-' + phone.slice(-4).toUpperCase();

        const newCustomer = {
            id: 'CUST_' + Date.now(), name: name, phone: phone, couponCode: couponCode,
            myRefCode: myRefCode, referredBy: refCode || '-', status: 'ready', points: 0
        };

        try {
            await fetch(GOOGLE_WEBAPP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    "action": "register", "name": name, "phone": phone, "couponCode": couponCode, "myRefCode": myRefCode, "referredBy": refCode || '-'
                })
            });
        } catch (e) { console.error(e); }

        customers.push(newCustomer);
        localStorage.setItem('crm_customers_modam_v3', JSON.stringify(customers));

        document.getElementById('lblCouponCode').innerText = couponCode;
        document.getElementById('lblMyRefCode').innerText = myRefCode;
        
        routeTo('mPageComplete');
        alert('🎉 등록 정보가 전송되었습니다!');
    }

    function lookupCustomerPoint() {
        customers = JSON.parse(localStorage.getItem('crm_customers_modam_v3')) || [];
        const inputPhone = document.getElementById('queryPhone').value.trim().replace(/[^0-9]/g, '');
        const target = customers.find(c => c.phone === inputPhone);
        if(!target) { alert('등록 정보를 찾을 수 없습니다.'); return; }

        document.getElementById('queryResultTitle').innerText = `${target.name}님 현황`;
        document.getElementById('queryPointDisplay').innerText = `${(target.points || 0).toLocaleString()} P`;
        document.getElementById('queryMyRefCode').innerText = target.myRefCode;
        routeTo('mPageQueryResult');
    }

    function simulateKakaoShare() {
        const baseUrl = window.location.href.split('?')[0];
        const myRef = document.getElementById('lblMyRefCode').innerText;
        alert(`[링크 복사 완료]\n${baseUrl}?ref=${myRef}`);
    }

    function resetFormToStart() {
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';
        document.getElementById('custRefCode').value = '';
        if(document.getElementById('agreeRequired')) document.getElementById('agreeRequired').checked = false;
        routeTo('mPageLanding');
    }
</script>
</body>
</html>
